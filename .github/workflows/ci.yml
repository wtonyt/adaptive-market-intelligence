name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt

    - name: Start API
      run: |
        source .venv/bin/activate
        nohup uvicorn src.api.main:app --host 127.0.0.1 --port 8000 &

    - name: Wait for API
      run: sleep 5

    - name: Run API tests
      run: |
        source .venv/bin/activate
        pytest src/tests/test_api.py

    - name: Run pipeline tests
      run: |
        source .venv/bin/activate
        python src/ingestion/market_data.py
        python src/features/bronze.py
        python src/features/silver.py
        python src/features/gold.py

    # -----------------------------
    # DOCKER SECTION (fixed)
    # -----------------------------
    - name: Build API Docker image
      run: |
        docker build -t market-ml-api -f docker/Dockerfile.api .

    - name: Run API container
      run: |
        docker run -d -p 8001:8000 \
          -e API_KEY=${{ secrets.API_KEY }} \
          --name test-api \
          market-ml-api

    - name: Wait for API (container)
      run: sleep 10

    - name: Test API (inside container)
      run: |
        curl -f http://127.0.0.1:8001/ || exit 1

        curl -X POST http://127.0.0.1:8001/run \
          -H "x-api-key: ${{ secrets.API_KEY }}" || exit 1

    - name: Stop container
      run: docker stop test-api