name: Build and Push Poller Image

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name marketmlacr123

      - name: Build Docker image
        run: |
          docker build \
            -t marketmlacr123.azurecr.io/poller-service:latest \
            -f docker/Dockerfile.poller .

      - name: Push Docker image
        run: |
          docker push marketmlacr123.azurecr.io/poller-service:latest